<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<meta name='apple-mobile-web-app-capable' content='yes'>
<title>VATPAC Special Use Airspace Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:#a0aaaa;font-family:'Terminus',monospace;font-weight:bold;-webkit-user-select:none;user-select:none;}
.top{position:sticky;top:0;background:#829292;border-bottom:2px solid #5a6a6a;padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;z-index:5;}
.top h1{color:#000060;font-size:18px;letter-spacing:1px;margin-right:auto;}
.top .clock{color:#000060;font-size:14px;}
.top a.maplink{font-family:'Terminus',monospace;font-weight:bold;font-size:13px;border:2px solid #5a6a6a;background:#829292;color:#000060;padding:5px 10px;text-decoration:none;letter-spacing:1px;}
.top a.maplink:active{background:#000060;color:#c8ffc8;}
.top>button{border-color:#5a6a6a;background:#829292;padding:5px 10px;}
.top>button:hover,.top a.maplink:hover{background:#96a4a4;}
.request-count{display:inline-block;min-width:20px;margin-left:5px;padding:1px 5px;background:#600000;color:#fff;text-align:center;border-radius:9px;}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 14px;}
button,select,input{font-family:'Terminus',monospace;font-weight:bold;font-size:13px;border:2px solid #758383;background:#b5c0c0;color:#000060;padding:6px 10px;cursor:pointer;letter-spacing:1px;}
input[type=text],input[type=number],input[type=datetime-local]{background:#c8d0d0;cursor:text;}
input[type=text]{width:170px;}
input[type=number]{width:90px;}
button:hover{background:#c3cccc;}button:active{background:#8fa7ba;color:#001050;}
button.on{background:#a9bbd0;border-color:#617d99;color:#001050;}
button:disabled{cursor:default;color:#404a4a;background:#a0aaaa;border-color:#707878;}
button.danger-btn{background:#d9aaaa;border-color:#9a6262;color:#650000;}
.filter-label{color:#4c5b5b;font-size:11px;letter-spacing:1px;margin-left:4px;}
.notams{margin:0 14px 4px;border:2px solid #5a6a6a;background:#8f9c9c;}
.notams .nt-head{background:#5a6a6a;color:#e0e8e8;padding:6px 10px;font-size:12px;letter-spacing:1px;display:flex;gap:10px;align-items:center;}
.notams .nt-head button{padding:3px 8px;font-size:12px;background:#829292;}
.nt-card{border-top:1px solid #5a6a6a;padding:8px 10px;font-size:13px;color:#101820;}
.nt-card .nt-title{color:#000060;font-size:14px;}
.nt-card .nt-dates{color:#404a4a;font-size:12px;margin:2px 0 4px;}
.nt-card .nt-des,.nt-card .nt-times{color:#101820;font-size:12px;word-wrap:break-word;margin-top:2px;}
.nt-card .nt-unmatched{color:#600000;font-size:12px;margin-top:2px;}
.nt-card button{margin-top:6px;margin-right:6px;}
.list{padding:0 14px 24px;overflow-x:visible;}
.row{display:grid;grid-template-columns:minmax(190px,1.2fr) 90px minmax(180px,1.15fr) 95px 130px minmax(220px,2fr) 140px;gap:10px;min-width:0;align-items:center;background:#8f9c9c;border:1px solid #5a6a6a;border-top:none;padding:7px 12px;font-size:13px;color:#101820;}
.row>span:not(:last-child){border-right:1px solid #748282;padding:7px 8px 7px 0;margin-block:-7px;min-height:45px;display:flex;align-items:center;}
.row.head{background:#5a6a6a;color:#e0e8e8;position:static;border-top:1px solid #5a6a6a;padding-block:0;min-height:36px;font-size:12px;letter-spacing:1px;}
.row.head>span{white-space:nowrap;padding-left:3px;}
.row.head>span:not(:last-child){border-right-color:#829292;margin-block:0;min-height:35px;padding-block:7px;}
.row .nm{color:#000060;font-size:14px;}
.pill{display:inline-flex;align-items:center;justify-content:center;min-width:0;min-height:25px;padding:3px 6px;font-size:11px;letter-spacing:.7px;text-align:center;border:1px solid #748282;background:#b5bebe;color:#344444;overflow:hidden;}
.pill.act{background:#d9a0a0;border-color:#9a5d5d;color:#580000;}
.pill.pre{background:#dfcf8e;border-color:#9b853f;color:#493900;}
.pill.sched{background:#93bcbc;border-color:#547f7f;color:#003f3f;}
.pill.def{background:#b2baba;border-color:#747e7e;color:#303b3b;}
.pill.user{background:#a4b8c7;border-color:#607c91;color:#183c58;}
.pill.ra1{background:#9bc9ad;border-color:#5d9874;color:#064c24;}.pill.ra2{background:#dfcf8e;border-color:#9b853f;color:#493900;}.pill.ra3{background:#d9a0a0;border-color:#9a5d5d;color:#580000;}
.pill.dngr{background:#e6a45f;border-color:#a86628;color:#542800;}
.status-pills,.row-actions{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.status-pills{width:100%;}.status-pills .pill{flex:1;}
.row:not(.head)>.cat .pill{width:100%;}
.row-actions{width:100%;gap:6px;}
.rowbtn{flex:1;min-width:0;width:auto;padding:6px 4px;}
.dataset-lock{width:100%;height:31px;border:2px solid #707878;background:#a0aaaa;color:#404848;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.8px;}
.user-lock{width:100%;height:31px;border:2px solid #607c91;background:#a4b8c7;color:#183c58;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.8px;}
.editor{border:2px solid #5a6a6a;border-top:none;background:#96a4a4;padding:14px;font-size:13px;color:#101820;}
.editor-grid{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:10px;align-items:start;max-width:1180px;margin:0 auto;}
.editor-section{border:1px solid #657575;background:#a7b1b1;padding:10px;min-width:0;}
.editor-section.wide{grid-column:1/-1;}
.editor h3{color:#000060;font-size:13px;letter-spacing:1px;margin:0 0 8px;padding-bottom:6px;border-bottom:1px solid #758585;}
.editor .field-grid{display:grid;grid-template-columns:repeat(2,minmax(110px,220px));gap:8px;align-items:end;justify-content:start;}
.editor .field{display:flex;flex-direction:column;gap:3px;min-width:0;}
.editor .field input,.editor .field select{width:100%;}
.editor .lv-row,.editor .win-row{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-bottom:7px;}
.editor .win-row{display:grid;grid-template-columns:minmax(190px,280px) minmax(190px,280px) auto;justify-content:start;}
.editor .win-row .field{min-width:0;}
.editor label{color:#404a4a;font-size:11px;letter-spacing:.6px;}
.editor .section-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;}
.editor .hint{color:#404a4a;font-size:11px;margin-top:7px;line-height:1.35;}
.copy-toolbar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:8px;}
.copy-toolbar input{width:min(300px,100%);background:#c8d0d0;}
.copy-targets{border:1px solid #657575;background:#99a5a5;display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));max-height:160px;overflow:auto;}
.copy-target{display:flex;align-items:center;gap:7px;padding:7px 8px;border-right:1px solid #7b8989;border-bottom:1px solid #7b8989;cursor:pointer;color:#101820;}
.copy-target:hover{background:#b3bcbc;}.copy-target input{width:auto;accent-color:#000060;}
.copy-target .target-type{margin-left:auto;color:#4c5959;font-size:10px;letter-spacing:.5px;}
.copy-empty{padding:10px;color:#404a4a;grid-column:1/-1;}
.msg{padding:8px 14px;color:#600000;font-size:13px;min-height:28px;}
.request-panel{display:none;position:fixed;inset:0;background:rgba(20,30,30,.7);z-index:20;padding:5vh 14px;overflow:auto;}
.request-panel.open{display:block;}.request-box{max-width:820px;margin:auto;background:#a0aaaa;border:3px solid #5a6a6a;box-shadow:8px 8px 0 rgba(0,0,0,.3)}
.request-head{display:flex;align-items:center;gap:10px;padding:10px;background:#5a6a6a;color:#e0e8e8;letter-spacing:1px}.request-head span{margin-right:auto}
.request-card{padding:12px;border-top:1px solid #5a6a6a;color:#101820}.request-card:first-child{border-top:0}.request-title{color:#000060;font-size:15px}.request-meta{margin-top:5px;font-size:12px;color:#344444}.request-notes{margin-top:7px;white-space:pre-wrap;font-weight:normal}.request-actions{display:flex;gap:7px;margin-top:9px}.request-actions button{width:110px}
.log-row{display:grid;grid-template-columns:145px minmax(130px,1fr) 120px minmax(180px,1.5fr);gap:10px;padding:10px 12px;border-top:1px solid #5a6a6a;font-size:12px;color:#101820}.log-row:first-child{border-top:0}.log-time,.log-source{color:#404a4a}.log-area{color:#000060;font-size:13px}.log-actor{margin-top:3px;color:#344444}.log-empty{padding:18px;text-align:center;color:#404a4a}
.request-edit{margin-top:10px;padding:10px;border:2px solid #5a6a6a;background:#96a4a4;display:grid;grid-template-columns:1fr 1fr;gap:9px}.request-edit .full{grid-column:1/-1}.request-edit label{display:block;color:#404a4a;font-size:11px;margin-bottom:3px}.request-edit input,.request-edit select{width:100%;background:#c8d0d0}.request-area-list{border:2px solid #5a6a6a;background:#a0aaaa;max-height:220px;overflow:auto;display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}.request-edit .request-area-option{display:flex;align-items:center;gap:7px;padding:7px 9px;margin:0;border-right:1px solid #829292;border-bottom:1px solid #829292;color:#101820;cursor:pointer}.request-edit .request-area-option:hover{background:#b2bbbb}.request-edit .request-area-option input{width:auto;accent-color:#000060}.request-area-option .area-type{margin-left:auto;color:#404a4a}.request-edit .request-actions{grid-column:1/-1;margin-top:0}
.request-slot{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px;padding:8px;border:1px solid #5a6a6a}.request-slot button{height:31px}
.request-edit .request-area-option select{width:auto;margin-left:5px;padding:3px}
@media (max-width:760px){
  .list{overflow-x:visible;}.row{grid-template-columns:minmax(0,1fr) 100px 60px;grid-template-areas:'name type cat' 'status status status' 'actions actions actions';grid-auto-rows:auto;min-width:0;}
  .row>span:not(:last-child){border-right:0;padding:0;margin-block:0;min-height:31px;}
  .row .nm{grid-area:name;}
  .row .type{grid-area:type;}
  .row .cat{grid-area:cat;}
  .row .status-pills{grid-area:status;}
  .row .row-actions{grid-area:actions;}
  .row > .sched,.row > .lv{display:none;}
  .row.head{grid-template-areas:'name type cat';}
  .row.head .st,.row.head .ac{display:none;}
  .request-edit{grid-template-columns:1fr}.request-edit .full{grid-column:auto}.request-area-list{grid-template-columns:1fr}.request-slot{grid-template-columns:1fr}
  .log-row{grid-template-columns:1fr 1fr}.log-detail{grid-column:1/-1}
  .editor-grid{grid-template-columns:1fr}.editor-section.wide{grid-column:auto}.editor .win-row{grid-template-columns:1fr}.copy-targets{grid-template-columns:1fr 1fr}
}
@media (min-width:761px) and (max-width:1050px){
  .editor-grid{grid-template-columns:1fr}.editor-section.wide{grid-column:auto}.copy-targets{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class='top'>
  <h1>VATPAC SPECIAL USE AIRSPACE MANAGER</h1>
  <button id='requestsBtn'>REQUESTS <span class='request-count' id='requestCount'>0</span></button>
  <button id='logsBtn'>ACTIVATION LOG</button>
  <a class='maplink' href='/request'>REQUEST FORM</a>
  <a class='maplink' href='/map'>AIRSPACE MAP</a>
  <span class='clock' id='clock'>----Z</span>
</div>
<div class='controls'>
  <span class='filter-label'>TYPE</span>
  <button id='fAll' class='on'>ALL</button>
  <button id='fDanger'>DANGER</button>
  <button id='fRestricted'>RESTRICTED</button>
  <button id='fMilitary'>MILITARY</button>
  <span class='filter-label'>STATUS</span>
  <button id='sAll' class='on'>ALL STATUS</button>
  <button id='sActive'>ACTIVE</button>
  <button id='sScheduled'>SCHEDULED</button>
  <button id='sDeactive'>DEACTIVE</button>
  <input type='text' id='search' placeholder='FILTER NAME...'>
  <select id='dur'>
    <option value='0'>UNTIL DEACTIVATED</option>
    <option value='30'>30 MIN</option>
    <option value='60'>1 HR</option>
    <option value='120'>2 HR</option>
    <option value='240'>4 HR</option>
    <option value='HJ'>HJ · SUNRISE TO SUNSET</option>
    <option value='HN'>HN · SUNSET TO SUNRISE</option>
  </select>
  <button id='deactAll' class='danger-btn'>CLEAR SHARED ACTIVATIONS</button>
</div>
<div class='notams'>
  <div class='nt-head'><span>AIRSPACE NOTAMS</span><span class='pill sched'>AUTO</span><button id='scan'>REFRESH</button><span id='ntStatus'></span></div>
  <div id='ntList'></div>
</div>
<div class='msg' id='msg'></div>
<div class='list' id='list'></div>
<div class='request-panel' id='requestPanel'><div class='request-box'>
  <div class='request-head'><span>ACTIVATION REQUESTS</span><button id='closeRequests'>CLOSE</button></div>
  <div id='requestList'></div>
</div></div>
<div class='request-panel' id='logsPanel'><div class='request-box'>
  <div class='request-head'><span>ACTIVATION LOG</span><button id='closeLogs'>CLOSE</button></div>
  <div id='logsList'><div class='log-empty'>LOADING...</div></div>
</div></div>
<script>
(function(){
  var areas = [];
  var requestItems = [];
  var activationLogs = [];
  var editingRequest = null;
  var requestEditWindows = [];
  var filter = 'ALL';
  var statusFilter = 'ALL';
  var search = '';
  var editing = null;   // area name whose editor is open
  var draft = null;     // {floor, ceiling, windows:[{f,t}]} while editing
  var copyTargets = [];
  var copySearch = '';

  function esc(t){
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
  }

  function lv(v){
    if (v <= 0) return 'SFC';
    if (v >= 11000) return 'FL' + Math.round(v/100);
    return v + 'FT';
  }

  function setMsg(t){ document.getElementById('msg').textContent = t || ''; }

  function logSource(source){
    var labels = {website:'WEBSITE',schedule:'SCHEDULE',request_schedule:'REQUEST SCHEDULE',vatsys:'VATSYS',vatsys_schedule:'VATSYS SCHEDULE',notam:'NOTAM',notam_schedule:'NOTAM SCHEDULE'};
    return labels[source] || String(source || 'UNKNOWN').toUpperCase();
  }

  function renderLogs(){
    var html = '';
    for (var i = 0; i < activationLogs.length; i++){
      var item = activationLogs[i], when = new Date(item.OccurredAt);
      var whenText = Number.isFinite(when.getTime()) ? when.toISOString().slice(0,16).replace('T',' ') + 'Z' : item.OccurredAt;
      var actor = item.ActorName || '';
      if (item.ActorCid) actor += (actor ? ' · ' : '') + 'CID ' + item.ActorCid;
      if (!actor) actor = item.SourceType.indexOf('schedule') >= 0 ? 'AUTOMATED' : 'IDENTITY UNAVAILABLE';
      html += "<div class='log-row'><span class='log-time'>" + esc(whenText) + "</span>"
        + "<span><span class='log-area'>" + esc(item.AreaName) + "</span><div class='log-actor'>" + esc(actor) + "</div></span>"
        + "<span class='log-source'>" + esc(logSource(item.SourceType)) + "</span>"
        + "<span class='log-detail'>" + esc(item.Details || 'Activated') + "</span></div>";
    }
    document.getElementById('logsList').innerHTML = html || "<div class='log-empty'>NO ACTIVATIONS HAVE BEEN LOGGED YET.</div>";
  }

  function loadLogs(){
    document.getElementById('logsList').innerHTML = "<div class='log-empty'>LOADING...</div>";
    fetch('/api/sua/logs').then(function(r){ return r.json(); }).then(function(d){
      if (!d.Success){ setMsg(d.Error || 'Unable to load activation log.'); return; }
      activationLogs = d.Logs || []; renderLogs();
    }).catch(function(e){ setMsg(e.message || 'Unable to load activation log.'); });
  }

  // wire 'yyyyMMddHHmm' <-> input 'yyyy-MM-ddTHH:mm' (times are UTC)
  function wireToInput(w){
    return w.substring(0,4)+'-'+w.substring(4,6)+'-'+w.substring(6,8)+'T'+w.substring(8,10)+':'+w.substring(10,12);
  }
  function inputToWire(v){
    return v ? v.replace(/[-T:]/g,'') : '';
  }
  function wireToShow(w){
    return w.substring(6,8)+'/'+w.substring(4,6)+' '+w.substring(8,12);
  }

  function render(){
    var el = document.getElementById('list');
    var html = "<div class='row head'><span class='st'>STATUS</span><span class='cat'>CATEGORY</span><span>NAME</span><span>TYPE</span><span class='lv'>LEVELS</span><span class='sched'>SCHEDULE</span><span class='ac'></span></div>";
    var shown = 0;
    for (var i = 0; i < areas.length; i++){
      var a = areas[i];
      if (filter !== 'ALL' && a.Type.toUpperCase() !== filter) continue;
      if (statusFilter === 'ACTIVE' && !a.Active) continue;
      if (statusFilter === 'SCHEDULED' && !(a.Scheduled && !a.Active)) continue;
      if (statusFilter === 'DEACTIVE' && (a.Active || a.PreActive || a.Scheduled)) continue;
      if (search && a.Name.toUpperCase().indexOf(search) < 0) continue;
      shown++;
      var status = a.Active ? "<span class='pill act'>ACTIVE</span>" : (a.PreActive ? "<span class='pill pre'>PREACT</span>" : "<span class='pill'>DEACTIVE</span>");
      if (a.Controller){
        var userLabel = 'USER';
        if (a.ControllerCids && a.ControllerCids.length) userLabel += ': ' + a.ControllerCids.join(', ');
        status += "<span class='pill user'>" + esc(userLabel) + "</span>";
      } else {
        if (a.Scheduled && !a.Active) status = "<span class='pill'>DEACTIVE</span><span class='pill sched'>SCHED</span>";
        if (a.Default) status += "<span class='pill def'>DEFAULT</span>";
        // Manual is an internal source type, not a useful operator-facing state.
      }
      var restricted = a.Type === 'Restricted' || a.Name.charAt(0).toUpperCase() === 'R';
      var category = (a.Active || a.PreActive) && !restricted
        ? "<span class='pill dngr'>DNGR</span>"
        : ((a.Active || a.PreActive) && a.RaCategory
          ? "<span class='pill " + a.RaCategory.toLowerCase() + "'>" + esc(a.RaCategory) + "</span>"
          : '&mdash;');
      var sched = a.Schedule ? esc(a.Schedule) : '';
      if (a.Windows.length && !a.SolarMode){
        var wins = [];
        for (var k = 0; k < a.Windows.length && k < 3; k++){
          var pr = a.Windows[k].split('-');
          wins.push(wireToShow(pr[0]) + '-' + pr[1].substring(8,12) + 'Z');
        }
        if (a.Windows.length > 3) wins.push('+' + (a.Windows.length-3));
        sched += (sched ? ' | ' : '') + 'PLN: ' + wins.join(', ');
      }
      var enc = encodeURIComponent(a.Name);
      var actBtn = a.Staged
        ? "<button class='rowbtn' onclick=\"act('deactivate','" + enc + "')\">DEACT</button>"
        : "<button class='rowbtn' onclick=\"act('activate','" + enc + "')\">ACT</button>";
      var editBtn = "<button class='rowbtn' onclick=\"toggleEdit('" + enc + "')\">" + (editing === a.Name ? 'CLOSE' : 'EDIT') + "</button>";
      var actions = a.Default
        ? "<span class='dataset-lock'>DATASET LOCKED</span>"
        : (a.Controller ? "<span class='user-lock'>USER LOCKED</span>" : actBtn + editBtn);
      html += "<div class='row'>"
        + "<span class='status-pills'>" + status + "</span>"
        + "<span class='cat'>" + category + "</span>"
        + "<span class='nm'>" + esc(a.Name) + "</span>"
        + "<span class='type'>" + esc(a.Type) + "</span>"
        + "<span class='lv'>" + lv(a.Floor) + '&ndash;' + lv(a.Ceiling) + "</span>"
        + "<span class='sched'>" + (sched || '&mdash;') + "</span>"
        + "<span class='row-actions'>" + actions + "</span>"
        + "</div>";
      if (!a.Default && !a.Controller && editing === a.Name) html += renderEditor(a);
    }
    if (!areas.length) html += "<div class='row'>The shared airspace catalogue is empty.</div>";
    else if (!shown) html += "<div class='row'>No areas match the filter.</div>";
    el.innerHTML = html;
  }

  function renderEditor(a){
    var h = "<div class='editor'><div class='editor-grid'>";
    h += "<section class='editor-section'><h3>LEVELS (FT)" + (a.LevelsEdited ? " &mdash; EDITED" : "") + "</h3>"
       + "<div class='field-grid'><label class='field'>FLOOR<input type='number' id='edFloor' step='100' value='" + draft.floor + "'></label>"
       + "<label class='field'>CEILING<input type='number' id='edCeiling' step='100' value='" + draft.ceiling + "'></label></div>"
       + "<div class='section-actions'><button onclick='saveLevels()'>SAVE LEVELS</button></div></section>";
    if (a.Type === 'Restricted' || a.Name.charAt(0).toUpperCase() === 'R') h += "<section class='editor-section'><h3>RA CATEGORY</h3><div class='field-grid'><label class='field'>CATEGORY<select id='edCategory'><option" + (draft.category === 'RA1' ? ' selected' : '') + ">RA1</option><option" + (draft.category === 'RA2' ? ' selected' : '') + ">RA2</option><option" + (draft.category === 'RA3' ? ' selected' : '') + ">RA3</option></select></label></div><div class='section-actions'><button onclick='saveCategory()'>SAVE CATEGORY</button></div></section>";
    h += "<section class='editor-section wide'><h3>ACTIVE TIMES (UTC)</h3>";
    h += "<div class='field-grid'><label class='field'>MODE<select id='edTimeMode' onchange='timeModeChanged(this)'><option value='WINDOWS'" + (draft.timeMode === 'WINDOWS' ? ' selected' : '') + ">DATED UTC WINDOWS</option><option value='HJ'" + (draft.timeMode === 'HJ' ? ' selected' : '') + ">HJ · SUNRISE TO SUNSET</option><option value='HN'" + (draft.timeMode === 'HN' ? ' selected' : '') + ">HN · SUNSET TO SUNRISE</option></select></label></div>";
    if (draft.timeMode === 'WINDOWS'){
      for (var i = 0; i < draft.windows.length; i++){
        h += "<div class='win-row'><label class='field'>FROM<input type='datetime-local' data-wi='" + i + "' data-side='f' value='" + draft.windows[i].f + "' onchange='winEdit(this)'></label>"
           + "<label class='field'>TO<input type='datetime-local' data-wi='" + i + "' data-side='t' value='" + draft.windows[i].t + "' onchange='winEdit(this)'></label>"
           + "<button onclick='winDel(" + i + ")'>X</button></div>";
      }
    }
    h += "<div class='section-actions'>";
    if (draft.timeMode === 'WINDOWS') h += "<button onclick='winAdd()'>+ ADD TIME</button>";
    h += "<button onclick='saveWindows()'>SAVE ACTIVATION TIME</button>";
    if (a.Staged) h += "<button class='danger-btn' onclick=\"act('deactivate','" + encodeURIComponent(a.Name) + "')\">CLEAR SAVED</button>";
    h += "</div>";
    h += "<div class='hint'>HJ uses sunrise to sunset and HN uses sunset to the next sunrise at this airspace. Times and levels are saved to the shared activation.</div>";
    h += "</section>";
    h += renderCopyPanel(a);
    h += "</div></div>";
    return h;
  }

  function renderCopyPanel(a){
    var targets = [];
    for (var i = 0; i < areas.length; i++){
      var candidate = areas[i];
      if (candidate.Name !== a.Name && !candidate.Default && !candidate.Controller) targets.push(candidate);
    }
    var h = "<section class='editor-section wide'><h3>COPY " + esc(a.Name) + " SETTINGS TO OTHER SUA</h3>"
      + "<div class='copy-toolbar'><input type='text' id='copySearch' value='" + esc(copySearch) + "' placeholder='SEARCH SUA...' oninput='filterCopyTargets(this.value)'><button onclick='setCopyTargets(true)'>SELECT SHOWN</button><button onclick='setCopyTargets(false)'>CLEAR SELECTION</button><span class='hint'>Copies levels and activation times. RA category is copied only to Restricted areas.</span></div><div class='copy-targets'>";
    if (!targets.length) h += "<div class='copy-empty'>No other editable SUA are available.</div>";
    for (var j = 0; j < targets.length; j++){
      var checked = copyTargets.indexOf(targets[j].Name) >= 0 ? ' checked' : '';
      var targetSearch = (targets[j].Name + ' ' + targets[j].Type).toUpperCase();
      var hidden = copySearch && targetSearch.indexOf(copySearch) < 0 ? " style='display:none'" : '';
      h += "<label class='copy-target' data-search='" + esc(targetSearch) + "'" + hidden + "><input type='checkbox' class='copy-target-input' value='" + esc(targets[j].Name) + "'" + checked + ">" + esc(targets[j].Name) + "<span class='target-type'>" + esc(targets[j].Type) + "</span></label>";
    }
    h += "</div><div class='section-actions'><button onclick='applyCopy()'>APPLY TO SELECTED SUA</button></div>"
      + "<div class='hint'>Existing controller-locked or dataset-controlled areas cannot be replaced.</div></section>";
    return h;
  }

  window.toggleEdit = function(enc){
    var name = decodeURIComponent(enc);
    if (editing === name){ editing = null; draft = null; copyTargets = []; copySearch = ''; render(); return; }
    var a = null;
    for (var i = 0; i < areas.length; i++) if (areas[i].Name === name) a = areas[i];
    if (!a) return;
    editing = name;
    copyTargets = [];
    copySearch = '';
    draft = { floor: a.Floor, ceiling: a.Ceiling, category: a.RaCategory || 'RA1', timeMode: a.SolarMode || 'WINDOWS', windows: [] };
    for (var k = 0; k < a.Windows.length; k++){
      var pr = a.Windows[k].split('-');
      draft.windows.push({ f: wireToInput(pr[0]), t: wireToInput(pr[1]) });
    }
    render();
  };

  window.winEdit = function(inp){
    var i = parseInt(inp.getAttribute('data-wi'), 10);
    if (!draft.windows[i]) return;
    draft.windows[i][inp.getAttribute('data-side')] = inp.value;
  };

  window.timeModeChanged = function(sel){
    syncLevelDraft();
    syncCopyTargets();
    draft.timeMode = sel.value;
    render();
  };

  window.winAdd = function(){
    syncLevelDraft();
    syncCopyTargets();
    var now = new Date();
    var pad = function(n){ return (n < 10 ? '0' : '') + n; };
    var base = now.getUTCFullYear() + '-' + pad(now.getUTCMonth()+1) + '-' + pad(now.getUTCDate()) + 'T' + pad(now.getUTCHours()) + ':' + pad(now.getUTCMinutes());
    var end = new Date(now.getTime() + 3600000);
    var baseEnd = end.getUTCFullYear() + '-' + pad(end.getUTCMonth()+1) + '-' + pad(end.getUTCDate()) + 'T' + pad(end.getUTCHours()) + ':' + pad(end.getUTCMinutes());
    draft.windows.push({ f: base, t: baseEnd });
    render();
  };

  window.winDel = function(i){
    syncLevelDraft();
    syncCopyTargets();
    draft.windows.splice(i, 1);
    render();
  };

  function syncLevelDraft(){
    var f = document.getElementById('edFloor');
    var c = document.getElementById('edCeiling');
    if (f) draft.floor = f.value;
    if (c) draft.ceiling = c.value;
    var category = document.getElementById('edCategory');
    if (category) draft.category = category.value;
  }

  window.setCopyTargets = function(selectAll){
    var inputs = document.querySelectorAll('.copy-target-input');
    if (!selectAll) copyTargets = [];
    for (var i = 0; i < inputs.length; i++){
      var visible = inputs[i].parentNode.style.display !== 'none';
      if (!selectAll || visible) inputs[i].checked = selectAll;
    }
    syncCopyTargets();
  };

  window.filterCopyTargets = function(value){
    copySearch = String(value || '').trim().toUpperCase();
    var options = document.querySelectorAll('.copy-target');
    for (var i = 0; i < options.length; i++) options[i].style.display = !copySearch || options[i].getAttribute('data-search').indexOf(copySearch) >= 0 ? '' : 'none';
  };

  function syncCopyTargets(){
    var inputs = document.querySelectorAll('.copy-target-input');
    copyTargets = [];
    for (var i = 0; i < inputs.length; i++) if (inputs[i].checked) copyTargets.push(inputs[i].value);
  }

  window.applyCopy = function(){
    syncLevelDraft();
    syncCopyTargets();
    if (!copyTargets.length){ setMsg('Select at least one SUA to copy these settings to.'); return; }
    var windows = [];
    for (var j = 0; j < draft.windows.length; j++){
      var from = inputToWire(draft.windows[j].f), to = inputToWire(draft.windows[j].t);
      if (from.length === 12 && to.length === 12) windows.push(from + '-' + to);
    }
    fetch('/api/sua/copy', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
      Source: editing, Targets: copyTargets, Floor: draft.floor, Ceiling: draft.ceiling,
      Category: draft.category, TimeMode: draft.timeMode, Windows: windows
    })}).then(function(r){ return r.json(); }).then(function(d){
      if (!d.Success){ setMsg(d.Error || 'Copy failed.'); return; }
      setMsg('Copied ' + editing + ' settings to ' + d.Applied.join(', ') + '.');
      refresh(true);
    }).catch(function(e){ setMsg(e.message || 'Copy failed.'); });
  };

  window.saveLevels = function(){
    syncLevelDraft();
    var url = '/api/sua/levels?name=' + encodeURIComponent(editing) + '&floor=' + encodeURIComponent(draft.floor) + '&ceiling=' + encodeURIComponent(draft.ceiling);
    post(url);
  };

  window.saveCategory = function(){
    var category = document.getElementById('edCategory').value;
    draft.category = category;
    post('/api/sua/category?name=' + encodeURIComponent(editing) + '&category=' + encodeURIComponent(category));
  };

  window.saveWindows = function(){
    syncLevelDraft();
    if (draft.timeMode === 'HJ' || draft.timeMode === 'HN'){
      post('/api/sua/activate?name=' + encodeURIComponent(editing) + '&mode=' + draft.timeMode);
      return;
    }
    var parts = [];
    for (var i = 0; i < draft.windows.length; i++){
      var f = inputToWire(draft.windows[i].f);
      var t = inputToWire(draft.windows[i].t);
      if (f.length === 12 && t.length === 12) parts.push(f + '-' + t);
    }
    post('/api/sua/windows?name=' + encodeURIComponent(editing) + '&windows=' + parts.join(','));
  };

  function post(url){
    fetch(url, { method: 'POST' }).then(function(r){ return r.json(); }).then(function(d){
      setMsg(d.Success ? '' : (d.Error || 'Request failed.'));
      refresh(true);
    }).catch(function(e){ setMsg(e.message || 'Request failed.'); });
  }

  function refresh(force){
    if (editing && !force) return; // don't clobber open editor inputs
    fetch('/api/sua/areas').then(function(r){ return r.json(); }).then(function(d){
      areas = d.Areas || [];
      document.getElementById('clock').textContent = d.UtcTime || '----Z';
      setMsg('');
      if (editing && !force) return;
      render();
    }).catch(function(){ setMsg('The cloud service is temporarily unavailable.'); });
  }

  window.act = function(verb, name){
    var url = '/api/sua/' + verb + '?name=' + name;
    if (verb === 'activate'){
      var duration = document.getElementById('dur').value;
      url += (duration === 'HJ' || duration === 'HN') ? '&mode=' + duration : '&minutes=' + duration;
    }
    if (verb === 'deactivate' && editing === decodeURIComponent(name)){ editing = null; draft = null; }
    post(url);
  };

  function renderNotams(notams){
    var el = document.getElementById('ntList');
    if (!notams.length){
      el.innerHTML = "<div class='nt-card'>No airspace NOTAMs found.</div>";
      return;
    }
    var html = '';
    for (var i = 0; i < notams.length; i++){
      var n = notams[i];
      html += "<div class='nt-card'>"
        + "<div class='nt-title'>" + esc(n.Title) + " <span class='pill " + (n.Status === 'CURRENT' ? 'act' : 'pre') + "'>" + esc(n.Status) + "</span> "
        + "<span class='pill sched'>AUTO SCHEDULED</span></div>"
        + "<div class='nt-dates'>" + esc((n.Start||'').replace('T',' ').substring(0,16)) + 'Z &ndash; ' + esc((n.End||'PERM').replace('T',' ').substring(0,16)) + "Z</div>"
        + "<div class='nt-des'>AREAS: " + esc(n.Designators.join(', ')) + "</div>";
      if (n.Windows.length)
        html += "<div class='nt-times'>TIMES: " + esc(n.Windows.join(', ')) + "</div>";
      if (n.Unmatched.length)
        html += "<div class='nt-unmatched'>NOT IN DATASET: " + esc(n.Unmatched.join(', ')) + "</div>";
      html += "</div>";
    }
    el.innerHTML = html;
  }

  function scanNotams(){
    document.getElementById('ntStatus').textContent = 'LOADING...';
    fetch('/api/sua/notams').then(function(r){ return r.json(); }).then(function(d){
      document.getElementById('ntStatus').textContent = '';
      if (!d.Success){ setMsg(d.Error || 'NOTAM scan failed.'); return; }
      renderNotams(d.Notams || []);
    }).catch(function(){ document.getElementById('ntStatus').textContent = ''; setMsg('NOTAM scan failed.'); });
  }

  function showRequestTime(value){
    return String(value || '').replace('T',' ').substring(0,16) + 'Z';
  }

  function requestInputTime(value){ return String(value || '').substring(0,16); }

  function requestWindowLabel(wire){
    var p = String(wire || '').split('-');
    if (p.length !== 2 || p[0].length !== 12 || p[1].length !== 12) return esc(wire);
    return esc(p[0].substring(6,8) + '/' + p[0].substring(4,6) + '/' + p[0].substring(0,4) + ' ' + p[0].substring(8,12) + 'Z – '
      + p[1].substring(6,8) + '/' + p[1].substring(4,6) + '/' + p[1].substring(0,4) + ' ' + p[1].substring(8,12) + 'Z');
  }

  function syncRequestSlots(id){
    for (var i = 0; i < requestEditWindows.length; i++){
      var start = document.getElementById('rqStart-' + id + '-' + i);
      var end = document.getElementById('rqEnd-' + id + '-' + i);
      if (start) requestEditWindows[i].Start = start.value;
      if (end) requestEditWindows[i].End = end.value;
    }
  }

  function requestSlotsEditor(q){
    var html = '';
    for (var i = 0; i < requestEditWindows.length; i++){
      html += "<div class='request-slot'><div><label>START (UTC)</label><input id='rqStart-" + esc(q.Id) + '-' + i + "' type='datetime-local' value='" + esc(requestEditWindows[i].Start) + "'></div>"
        + "<div><label>END (UTC)</label><input id='rqEnd-" + esc(q.Id) + '-' + i + "' type='datetime-local' value='" + esc(requestEditWindows[i].End) + "'></div>"
        + (requestEditWindows.length > 1 ? "<button class='danger-btn' onclick='removeRequestSlot(&quot;" + esc(q.Id) + "&quot;," + i + ")'>REMOVE</button>" : '') + "</div>";
    }
    return html + "<button onclick='addRequestSlot(&quot;" + esc(q.Id) + "&quot;)'>+ ADD ANOTHER TIME SLOT</button>";
  }

  function renderRequestEditor(q){
    var selectedNames = q.AreaNames && q.AreaNames.length ? q.AreaNames : [q.AreaName];
    var selectedCategories = {};
    var categoryItems = q.AreaCategories && q.AreaCategories.length ? q.AreaCategories : [];
    for (var c = 0; c < categoryItems.length; c++) selectedCategories[categoryItems[c].Name] = categoryItems[c].RaCategory;
    var checkboxes = '';
    for (var i = 0; i < areas.length; i++){
      var restrictedArea = areas[i].Type === 'Restricted' || areas[i].Name.charAt(0).toUpperCase() === 'R';
      var areaCategory = selectedCategories[areas[i].Name] || q.RaCategory || 'RA1';
      checkboxes += "<label class='request-area-option'><input type='checkbox' value='" + esc(areas[i].Name) + "'" + (selectedNames.indexOf(areas[i].Name) >= 0 ? ' checked' : '') + ">" + esc(areas[i].Name) + " <span class='area-type'>" + esc(areas[i].Type) + "</span>" + (restrictedArea ? "<select><option" + (areaCategory === 'RA1' ? ' selected' : '') + ">RA1</option><option" + (areaCategory === 'RA2' ? ' selected' : '') + ">RA2</option><option" + (areaCategory === 'RA3' ? ' selected' : '') + ">RA3</option></select>" : "<span class='pill dngr'>DNGR</span>") + "</label>";
    }
    return "<div class='request-edit'>"
      + "<div class='full'><label>AIRSPACE</label><div class='request-area-list' id='rqAreas-" + esc(q.Id) + "'>" + checkboxes + "</div></div>"
      + "<div class='full'><label>ACTIVATION TIME SLOTS</label>" + requestSlotsEditor(q) + "</div>"
      + "<div class='request-actions'><button onclick=\"saveRequestEdit('" + esc(q.Id) + "')\">SAVE CHANGES</button><button onclick='cancelRequestEdit()'>CANCEL</button></div></div>";
  }

  function loadRequests(){
    fetch('/api/sua/requests').then(function(r){ return r.json(); }).then(function(d){
      var requests = d.Requests || [];
      requestItems = requests;
      document.getElementById('requestCount').textContent = requests.length;
      var html = '';
      for (var i = 0; i < requests.length; i++){
        var q = requests[i];
        var requestedNames = q.AreaNames && q.AreaNames.length ? q.AreaNames : [q.AreaName];
        var categoryItems = q.AreaCategories && q.AreaCategories.length ? q.AreaCategories : requestedNames.map(function(name){ return {Name:name,RaCategory:q.RaCategory || 'RA1'}; });
        var title = '';
        for (var c = 0; c < categoryItems.length; c++){ var requestCategory = categoryItems[c].Name.charAt(0).toUpperCase() === 'R' ? (categoryItems[c].RaCategory || 'RA1') : 'DNGR'; title += (c ? ', ' : '') + esc(categoryItems[c].Name) + " <span class='pill " + esc(requestCategory.toLowerCase()) + "'>" + esc(requestCategory) + "</span>"; }
        var requestWindows = q.Windows && q.Windows.length ? q.Windows : [];
        var slotSummary = '';
        for (var w = 0; w < requestWindows.length; w++) slotSummary += "<div>SLOT " + (w + 1) + ' · ' + requestWindowLabel(requestWindows[w]) + "</div>";
        if (!slotSummary) slotSummary = esc(showRequestTime(q.StartUtc)) + " &ndash; " + esc(showRequestTime(q.EndUtc));
        html += "<div class='request-card'><div class='request-title'>" + title + "</div>"
          + "<div class='request-meta'>" + slotSummary + "<div>REQUESTED BY " + esc(q.Requester) + " &bull; " + esc(q.ContactEmail || '') + "</div></div>"
          + (q.Notes ? "<div class='request-notes'>" + esc(q.Notes) + "</div>" : '')
          + "<div class='request-actions'><button onclick=\"editRequest('" + esc(q.Id) + "')\">EDIT</button><button onclick=\"reviewRequest('" + esc(q.Id) + "','accept')\">ACCEPT</button><button class='danger-btn' onclick=\"reviewRequest('" + esc(q.Id) + "','decline')\">DECLINE</button></div>"
          + (editingRequest === q.Id ? renderRequestEditor(q) : '') + "</div>";
      }
      document.getElementById('requestList').innerHTML = html || "<div class='request-card'>No pending activation requests.</div>";
    }).catch(function(){ setMsg('Could not load activation requests.'); });
  }

  window.editRequest = function(id){
    editingRequest = id; requestEditWindows = [];
    for (var i = 0; i < requestItems.length; i++) if (requestItems[i].Id === id){
      var q = requestItems[i], windows = q.Windows || [];
      for (var w = 0; w < windows.length; w++){
        var p = String(windows[w]).split('-');
        if (p.length === 2) requestEditWindows.push({Start:wireToInput(p[0]), End:wireToInput(p[1])});
      }
      if (!requestEditWindows.length) requestEditWindows.push({Start:requestInputTime(q.StartUtc), End:requestInputTime(q.EndUtc)});
      break;
    }
    loadRequests();
  };
  window.cancelRequestEdit = function(){ editingRequest = null; loadRequests(); };
  window.addRequestSlot = function(id){
    syncRequestSlots(id);
    if (requestEditWindows.length >= 20){ setMsg('A request cannot contain more than 20 activation slots.'); return; }
    var start = requestEditWindows.length ? requestEditWindows[requestEditWindows.length - 1].End : requestInputTime(new Date().toISOString());
    var endDate = new Date(start + ':00Z'); endDate.setUTCHours(endDate.getUTCHours() + 1);
    requestEditWindows.push({Start:start, End:requestInputTime(endDate.toISOString())}); loadRequests();
  };
  window.removeRequestSlot = function(id, index){ syncRequestSlots(id); requestEditWindows.splice(index, 1); loadRequests(); };
  window.saveRequestEdit = function(id){
    syncRequestSlots(id);
    var areaInputs = document.getElementById('rqAreas-' + id).getElementsByTagName('input');
    var names = [];
    var areaCategories = [];
    for (var i = 0; i < areaInputs.length; i++) if (areaInputs[i].checked){ var categorySelect = areaInputs[i].parentNode.querySelector('select'); names.push(areaInputs[i].value); areaCategories.push({Name:areaInputs[i].value, RaCategory:categorySelect ? categorySelect.value : null}); }
    var payload = {
      Id: id, AreaCategories: areaCategories,
      Windows: requestEditWindows.map(function(w){ return {StartUtc:w.Start + ':00Z', EndUtc:w.End + ':00Z'}; })
    };
    fetch('/api/sua/requests/update', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) })
      .then(function(r){ return r.json(); }).then(function(d){
        if (!d.Success){ setMsg(d.Error || 'Request update failed.'); return; }
        editingRequest = null; setMsg(''); loadRequests();
      }).catch(function(){ setMsg('Request update failed.'); });
  };

  window.reviewRequest = function(id, decision){
    fetch('/api/sua/requests/review', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({Id:id, Decision:decision}) })
      .then(function(r){ return r.json(); }).then(function(d){
        if (!d.Success){ setMsg(d.Error || 'Request review failed.'); return; }
        editingRequest = null; setMsg(''); loadRequests(); refresh(true);
      }).catch(function(){ setMsg('Request review failed.'); });
  };

  function setFilter(f, btn){
    filter = f;
    ['fAll','fDanger','fRestricted','fMilitary'].forEach(function(id){ document.getElementById(id).classList.remove('on'); });
    btn.classList.add('on');
    render();
  }

  function setStatusFilter(f, btn){
    statusFilter = f;
    ['sAll','sActive','sScheduled','sDeactive'].forEach(function(id){ document.getElementById(id).classList.remove('on'); });
    btn.classList.add('on');
    render();
  }

  document.getElementById('fAll').onclick = function(){ setFilter('ALL', this); };
  document.getElementById('fDanger').onclick = function(){ setFilter('DANGER', this); };
  document.getElementById('fRestricted').onclick = function(){ setFilter('RESTRICTED', this); };
  document.getElementById('fMilitary').onclick = function(){ setFilter('MILITARY', this); };
  document.getElementById('sAll').onclick = function(){ setStatusFilter('ALL', this); };
  document.getElementById('sActive').onclick = function(){ setStatusFilter('ACTIVE', this); };
  document.getElementById('sScheduled').onclick = function(){ setStatusFilter('SCHEDULED', this); };
  document.getElementById('sDeactive').onclick = function(){ setStatusFilter('DEACTIVE', this); };
  document.getElementById('search').oninput = function(){ search = this.value.trim().toUpperCase(); render(); };
  document.getElementById('deactAll').onclick = function(){
    editing = null; draft = null;
    fetch('/api/sua/deactivateall', { method: 'POST' }).then(function(){ refresh(true); }).catch(function(e){ setMsg(e.message || 'Request failed.'); });
  };
  document.getElementById('scan').onclick = scanNotams;
  document.getElementById('requestsBtn').onclick = function(){ document.getElementById('requestPanel').className = 'request-panel open'; loadRequests(); };
  document.getElementById('closeRequests').onclick = function(){ document.getElementById('requestPanel').className = 'request-panel'; };
  document.getElementById('requestPanel').onclick = function(e){ if (e.target === this) this.className = 'request-panel'; };
  document.getElementById('logsBtn').onclick = function(){ document.getElementById('logsPanel').className = 'request-panel open'; loadLogs(); };
  document.getElementById('closeLogs').onclick = function(){ document.getElementById('logsPanel').className = 'request-panel'; };
  document.getElementById('logsPanel').onclick = function(e){ if (e.target === this) this.className = 'request-panel'; };

  function startControlPage(){
    refresh(true);
    scanNotams();
    loadRequests();
    setInterval(function(){ refresh(false); }, 5000);
    setInterval(scanNotams, 60000);
    setInterval(loadRequests, 30000);
  }
  fetch('/api/auth/session').then(function(r){ return r.json(); }).then(function(d){
    if (!d.AuthEnabled || d.Authorized){ startControlPage(); return; }
    var message = d.Authenticated
      ? 'Your VATSIM account does not have permission to manage airspace.'
      : 'Log in with an authorised VATSIM account to manage airspace.';
    document.body.innerHTML = "<div style='max-width:620px;margin:15vh auto;padding:24px;border:3px solid #5a6a6a;background:#8f9c9c;text-align:center'><h1 style='color:#000060;font-size:18px'>SUA AIRSPACE</h1><p style='margin:18px 0'>" + esc(message) + "</p><a class='maplink' style='display:inline-block;border:2px solid #5a6a6a;padding:8px;color:#000060' href='" + (d.Authenticated ? '/api/auth/logout' : '/api/auth/login?return=%2F') + "'>" + (d.Authenticated ? 'LOG OUT' : 'LOG IN WITH VATSIM') + "</a></div>";
  }).catch(function(){ document.body.innerHTML = "<div class='msg'>Authentication service unavailable.</div>"; });
})();
</script>
</body>
</html>
